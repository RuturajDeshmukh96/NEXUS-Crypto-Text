{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticate | NEXUS Crypto Text</title>
    <meta name="description" content="Securely sign in to your NEXUS Crypto Text vault.">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- UI Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    
    <div class="auth-wrapper">
        <div class="auth-card glass-card fade-in hover-lift">
            
            <div style="text-align: center; margin-bottom: 40px;">
                <a href="{% url 'landing' %}" class="brand-logo" style="justify-content: center; font-size: 26px; font-family: 'Orbitron', sans-serif;">
                    <i class="fa-solid fa-shield-halved" style="color: var(--neon-cyan); filter: drop-shadow(0 0 6px rgba(6,182,212,0.4));"></i> NEXUS
                </a>
                <h2 style="font-size: 22px; margin-top: 16px; font-weight: 700;">Welcome Back</h2>
                <p style="color: var(--text-secondary); margin-top: 8px; font-size: 14px;">Authenticate to access your secure vault.</p>
            </div>

            <!-- Django integration point -->
            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                
                {% if form.errors %}
                <div style="background: var(--danger-bg); border: 1px solid rgba(239, 68, 68, 0.25); padding: 12px; border-radius: 10px; margin-bottom: 16px; color: var(--danger); font-size: 14px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fa-solid fa-circle-exclamation"></i> Invalid credentials. Access denied.
                </div>
                {% endif %}
                
                <div class="form-group">
                    <label class="form-label" for="username">Username / Email</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-envelope" style="position: absolute; left: 16px; top: 16px; color: var(--text-muted);"></i>
                        <input type="text" id="username" name="username" class="form-control" placeholder="operator@nexus.io" style="padding-left: 44px;" required>
                    </div>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
                        <a href="{% url 'forgot_password' %}" style="font-size: 12px; color: var(--neon-cyan);">Forgot Password?</a>
                    </div>
                    <div style="position: relative;">
                        <i class="fa-solid fa-lock" style="position: absolute; left: 16px; top: 16px; color: var(--text-muted);"></i>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" style="padding-left: 44px;" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; font-size: 15px; padding: 14px;">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Authenticate Session
                </button>
                
            </form>

            <div style="text-align: center; margin-top: 32px; font-size: 14px; color: var(--text-secondary);">
                No clearance? <a href="{% url 'register' %}" style="font-weight: 700; color: var(--neon-cyan);">Create Account</a>
            </div>
            
        </div>
    </div>

    <script>
        const saved = localStorage.getItem('cryptotext-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
    </script>
</body>
</html>
