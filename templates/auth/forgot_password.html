{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Clearance | NEXUS Crypto Text</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- UI Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    
    <div class="auth-wrapper">
        <div class="auth-card glass-card fade-in hover-lift">
            
            <div style="text-align: center; margin-bottom: 32px;">
                <a href="{% url 'landing' %}" class="brand-logo" style="justify-content: center; font-size: 26px; font-family: 'Orbitron', sans-serif;">
                    <i class="fa-solid fa-shield-halved" style="color: var(--neon-cyan); filter: drop-shadow(0 0 6px rgba(6,182,212,0.4));"></i> NEXUS
                </a>
                <h2 style="font-size: 22px; margin-top: 16px; font-weight: 700;">Recover Clearance</h2>
                <p style="color: var(--text-secondary); margin-top: 8px; font-size: 14px;">Enter your registered email for a secure reset link.</p>
            </div>

            <form action="{% url 'forgot_password' %}" method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-envelope" style="position: absolute; left: 16px; top: 16px; color: var(--text-muted);"></i>
                        <input type="email" id="email" name="email" class="form-control" placeholder="operator@nexus.io" style="padding-left: 44px;" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; font-size: 15px; padding: 14px;">
                    <i class="fa-solid fa-paper-plane"></i> Send Secure Reset Link
                </button>
                
            </form>

            <div style="text-align: center; margin-top: 32px; font-size: 14px; color: var(--text-secondary);">
                Remembered? <a href="{% url 'login' %}" style="font-weight: 700; color: var(--neon-cyan);">Sign In</a>
            </div>
            
        </div>
    </div>

    <script>
        const saved = localStorage.getItem('cryptotext-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
    </script>
</body>
</html>
